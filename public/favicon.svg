<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34a853;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="folderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbc04;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea4335;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)" opacity="0.1"/>
  
  <!-- Folder icon -->
  <g filter="url(#shadow)">
    <!-- Folder back -->
    <path d="M 50 75 L 50 130 Q 50 135 55 135 L 145 135 Q 150 135 150 130 L 150 85 Q 150 80 145 80 L 90 80 L 82 70 Q 80 67 76 67 L 55 67 Q 50 67 50 72 Z" 
          fill="url(#folderGradient)" opacity="0.9"/>
    
    <!-- Folder front flap -->
    <path d="M 50 72 L 76 67 Q 80 67 82 70 L 90 80 L 145 80 Q 150 80 150 85 L 150 95 L 50 95 Z" 
          fill="url(#folderGradient)"/>
  </g>
  
  <!-- Index/List lines -->
  <g opacity="0.9">
    <rect x="70" y="100" width="60" height="3" rx="1.5" fill="#ffffff"/>
    <rect x="70" y="108" width="50" height="3" rx="1.5" fill="#ffffff"/>
    <rect x="70" y="116" width="55" height="3" rx="1.5" fill="#ffffff"/>
    <rect x="70" y="124" width="45" height="3" rx="1.5" fill="#ffffff"/>
  </g>
  
  <!-- Google Drive colors dots (accent) -->
  <circle cx="135" cy="65" r="8" fill="#4285f4" opacity="0.8"/>
  <circle cx="148" cy="65" r="8" fill="#34a853" opacity="0.8"/>
  <circle cx="161" cy="65" r="8" fill="#fbbc04" opacity="0.8"/>
</svg>
